name: CI
on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  change-detection:
    name: 🔍 Change
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-change-detection.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2

  python-tests:
    name: 🐍 Test
    needs: change-detection
    if: fromJSON(needs.change-detection.outputs.run-python-tests)
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-24.04, ubuntu-24.04-arm, macos-26]
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-python-tests.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2
    with:
      runs-on: ${{ matrix.runs-on }}
      setup-mlir: true
      llvm-version: "8f264586d7521b0e305ca7bb78825aa3382ffef7"

  python-coverage:
    name: 🐍 Coverage
    needs: [change-detection, python-tests]
    if: fromJSON(needs.change-detection.outputs.run-python-tests)
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-python-coverage.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2
    permissions:
      contents: read
      id-token: write

  python-linter:
    name: 🐍 Lint
    needs: change-detection
    if: fromJSON(needs.change-detection.outputs.run-python-tests)
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-python-linter.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2
    with:
      enable-ty: true
      enable-mypy: false
      setup-mlir: true
      llvm-version: "8f264586d7521b0e305ca7bb78825aa3382ffef7"

  build-sdist:
    name: 🚀 CD (sdist)
    needs: change-detection
    if: fromJSON(needs.change-detection.outputs.run-cd)
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-python-packaging-sdist.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2

  build-wheel:
    name: 🚀 CD (wheel)
    needs: change-detection
    if: fromJSON(needs.change-detection.outputs.run-cd)
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-24.04, ubuntu-24.04-arm, macos-26]
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-python-packaging-wheel-cibuildwheel.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2
    with:
      runs-on: ${{ matrix.runs-on }}
      setup-mlir: true
      llvm-version: "8f264586d7521b0e305ca7bb78825aa3382ffef7"

  cpp-linter:
    name: 🇨‌ Lint
    needs: change-detection
    if: fromJSON(needs.change-detection.outputs.run-cpp-linter)
    uses: munich-quantum-toolkit/workflows/.github/workflows/reusable-cpp-linter.yml@fe2cdef83f21c972314c8040a1a31af9803b5498 # v2.0.2
    with:
      clang-version: 21
      build-project: true
      files-changed-only: true
      setup-python: true
      install-pkgs: "pennylane-catalyst==0.14.1,pennylane==0.44.1"
      cpp-linter-extra-args: "-std=c++20"
      setup-mlir: true
      llvm-version: "8f264586d7521b0e305ca7bb78825aa3382ffef7"
    permissions:
      contents: read
      pull-requests: write

  # this job does nothing and is only used for branch protection
  required-checks-pass:
    name: 🚦 Check
    if: always()
    permissions:
      contents: read
    needs:
      - change-detection
      - python-coverage
      - python-tests
      - python-linter
      - build-sdist
      - build-wheel
      - cpp-linter
    runs-on: ubuntu-slim
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          allowed-skips: >-
            ${{
              fromJSON(needs.change-detection.outputs.run-python-tests)
              && '' || 'python-tests,python-coverage,python-linter,'
            }}
            ${{
              fromJSON(needs.change-detection.outputs.run-cd)
              && '' || 'build-sdist,build-wheel,'
            }}
            ${{
              fromJSON(needs.change-detection.outputs.run-cpp-linter)
              && '' || 'cpp-linter,'
            }}
          jobs: ${{ toJSON(needs) }}
